version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: rag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongodb
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    volumes:
      - chroma_data:/app/chroma_data

volumes:
  mongo_data:
  chroma_data:
